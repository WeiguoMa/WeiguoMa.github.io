<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark" id="meta-color-scheme">
    <title>Home | Weiguo Ma</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/home.css">
</head>
<body>

    <button class="theme-toggle" id="theme-btn" title="Toggle Theme" aria-label="Toggle theme">
        <i class="ri-moon-line" id="theme-icon"></i>
    </button>

    <div id="loading-text">INITIALIZING WAVE FUNCTION...</div>

    <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
    </div>

    <div id="main-layout">
        <section class="profile-section">
            <h1 class="name-title" data-text="Weiguo Ma">Weiguo Ma</h1>
            <div class="subtitle">事以密成，言以泄败</div>

            <div class="intro-text">
                Salty Fish in Physics
            </div>

            <div class="button-container">
                <a href="about/" class="academic-btn"><i class="ri-user-smile-line"></i> About</a>
                <a href="research/" class="academic-btn"><i class="ri-flask-line"></i> Research</a>
                <a href="blog/" class="academic-btn"><i class="ri-article-line"></i> Blog</a>
            </div>
        </section>

        <section class="terminal-section">
            <div class="terminal-window" id="terminal-window">
                <div class="terminal-header">
                    <div class="window-controls">
                        <div class="control close"></div>
                        <div class="control minimize"></div>
                        <div class="control maximize"></div>
                    </div>
                    <div class="terminal-title">guest@weiguoma-lab:~</div>
                </div>

                <div class="terminal-body" id="terminal-body">
                    <div class="output-line">Terminal v1.0.0</div>
                    <br>
                    <div id="input-line" class="prompt-line">
                        <span class="prompt"><span class="path">~</span></span>
                        <span id="cmd-display" class="command-text"></span>
                        <span id="cmd-placeholder" class="command-placeholder">Type 'help' to find information...</span>
                        <span class="cursor"></span>
                    </div>
                </div>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" aria-label="Terminal command">
            </div>
        </section>
    </div>

<script defer src="assets/home.js"></script>
</body>
</html>
